upstream auth_service      { server auth-service:8001; }
upstream task_service      { server task-service:8002; }
upstream notify_service    { server notification-service:8003; }
upstream ws_service        { server websocket-service:8004; }
upstream frontend_app      { server frontend:3000; }

server {
    listen 80;
    server_name localhost;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    # ── Frontend (React) ──────────────────────────────────
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Auth Service ──────────────────────────────────────
    location /api/auth/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://auth_service/api/auth/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Task Service ──────────────────────────────────────
    location /api/tasks/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://task_service/api/tasks/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/projects/ {
        proxy_pass http://task_service/api/projects/;
        proxy_set_header Authorization $http_authorization;
    }

    # ── Notification Service ──────────────────────────────
    location /api/notifications/ {
        proxy_pass http://notify_service/api/notifications/;
        proxy_set_header Authorization $http_authorization;
    }

    # ── WebSocket ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://ws_service/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
