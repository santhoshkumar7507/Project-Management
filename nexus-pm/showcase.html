<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. // Omniscience Interface</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #030303;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .font-logo { font-family: 'Michroma', sans-serif; }

        /* Animated Dark Matter Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: #000;
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: drift 20s ease-in-out infinite alternate;
            z-index: -1;
            pointer-events: none;
        }
        .orb-1 { width: 50vw; height: 50vw; background: #0ea5e9; top: -20vh; left: -10vw; text-shadow: 0 0 20px #0ea5e9; }
        .orb-2 { width: 40vw; height: 40vw; background: #6366f1; bottom: -10vh; right: -10vw; animation-delay: -5s; animation-duration: 25s; }
        .orb-3 { width: 30vw; height: 30vw; background: #8b5cf6; top: 40vh; left: 30vw; animation-delay: -10s; animation-duration: 30s; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.1); }
        }

        /* Noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 50;
        }

        .glass {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 24px 40px rgba(0, 0, 0, 0.5);
        }

        .card-hover {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(14, 165, 233, 0.4);
            background: rgba(14, 165, 233, 0.03);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 20px rgba(14, 165, 233, 0.2);
        }

        .accent-glow {
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
            transition: all 0.3s;
        }
        .accent-glow:hover {
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.8);
            transform: translateY(-2px);
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            animation: pulse-text 3s infinite alternate;
        }
        @keyframes pulse-text {
            0% { text-shadow: 0 0 10px rgba(14, 165, 233, 0.4); }
            100% { text-shadow: 0 0 25px rgba(14, 165, 233, 0.8); }
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 3px;
            background: linear-gradient(to right, transparent, rgba(14, 165, 233, 0.5), transparent);
            animation: scanline 8s linear infinite;
            z-index: 40;
            pointer-events: none;
            opacity: 0.3;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="scanline"></div>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const COLUMNS = [
            { id: 'todo', label: 'INITIALIZING', color: '#94a3b8' },
            { id: 'progress', label: 'PROCESSING', color: '#0ea5e9' },
            { id: 'review', label: 'CALIBRATING', color: '#f59e0b' },
            { id: 'done', label: 'SECURED', color: '#10b981' },
        ];

        const INITIAL_TASKS = [
            { id: 1, title: 'Calibrate Arc Reactor Core', desc: 'Ensure palladium output is stable at 3 gigajoules per second.', status: 'progress', priority: 'Critical', user: 'TS' },
            { id: 2, title: 'Compile Mark L Nano-tech', desc: 'Housing unit detachment and bio-metric sync sequence.', status: 'todo', priority: 'High', user: 'VI' },
            { id: 3, title: 'VERONICA Orbital Drop Sync', desc: 'Global satellite positioning and atmospheric entry vectors.', status: 'review', priority: 'Medium', user: 'JR' },
            { id: 4, title: 'Stark Industries Firewall', desc: 'Update Quantum Encryption key pairs against external breaches.', status: 'done', priority: 'High', user: 'PP' },
            { id: 5, title: 'Heads Up Display (HUD) UI', desc: 'Enhance predictive targeting algorithms in tactical mode.', status: 'todo', priority: 'High', user: 'TS' },
        ];

        function App() {
            const [tasks, setTasks] = useState(INITIAL_TASKS);
            const [view, setView] = useState('dashboard');

            if (view === 'dashboard') {
                return (
                    <div className="p-8 md:p-16 max-w-[1600px] mx-auto min-h-screen flex flex-col pt-12 relative animate-[fadeIn_1s_ease-out]">
                        <header className="flex justify-between items-center mb-24">
                            <div className="flex items-center gap-5">
                                <div className="w-12 h-12 rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-400/50 shadow-[0_0_20px_rgba(6,182,212,0.4)]">
                                    <div className="w-4 h-4 rounded-full bg-cyan-400 animate-ping"></div>
                                </div>
                                <div className="text-3xl font-logo tracking-[0.2em] text-cyan-400 text-glow">J.A.R.V.I.S.</div>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="flex flex-col items-end mr-4">
                                    <span className="text-xs text-cyan-400 font-bold tracking-widest uppercase">Admin Secure Node</span>
                                    <span className="text-white font-logo text-[10px] tracking-[0.2em] opacity-50 mt-1">STARK // TONY</span>
                                </div>
                                <button className="glass px-6 py-2.5 rounded-full text-xs font-bold tracking-widest uppercase hover:bg-cyan-500/10 hover:border-cyan-400/50 transition-all border border-white/20 text-slate-300">Disconnect</button>
                            </div>
                        </header>

                        <main className="flex-1 flex flex-col relative z-10">
                            <div className="flex justify-between items-end mb-16">
                                <div>
                                    <h1 className="text-6xl md:text-7xl font-logo tracking-wider mb-6 font-bold text-white text-glow">OMNISCIENCE<br/><span className="text-cyan-400">INTERFACE</span></h1>
                                    <p className="text-cyan-400/80 tracking-widest uppercase text-sm mt-6 border-l-2 border-cyan-400/50 pl-5 py-2 font-medium">Secure Global Mainframe // Online and listening</p>
                                </div>
                                <button className="bg-cyan-500/10 border border-cyan-400/50 text-cyan-300 px-8 py-4 rounded-full font-bold text-sm tracking-widest uppercase hover:bg-cyan-400 hover:text-black hover:shadow-[0_0_30px_rgba(34,211,238,0.6)] transition-all backdrop-blur-md">
                                    Initiate Protocol +
                                </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                {[
                                    { name: 'STARK GLOBAL NET', desc: 'Real-time telemetry and advanced surveillance orchestration.', status: 'Active', color: '#0ea5e9' },
                                    { name: 'AVENGERS TACTICAL', desc: 'Combat analysis and hyper-response dispatch systems.', status: 'Standby', color: '#10b981' },
                                    { name: 'DEEP SPACE RADAR', desc: 'Extraterrestrial anomaly detection via orbital arrays.', status: 'Scanning', color: '#f59e0b' },
                                ].map((p, i) => (
                                    <div 
                                        key={i} 
                                        onClick={() => setView('board')}
                                        className="glass p-10 rounded-[32px] cursor-pointer card-hover relative overflow-hidden group"
                                    >
                                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-400 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                        <div className="flex justify-between items-center mb-8">
                                            <div className="flex items-center gap-3">
                                                <div className="w-2 h-2 rounded-full animate-pulse shadow-[0_0_10px_rgba(34,211,238,1)]" style={{backgroundColor: p.color}}></div>
                                                <span className="text-[10px] font-bold uppercase tracking-[0.2em]" style={{color: p.color}}>{p.status}</span>
                                            </div>
                                            <svg className="w-5 h-5 text-slate-500 group-hover:text-cyan-400 transition-colors transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                                        </div>
                                        <h3 className="text-2xl font-bold mb-4 font-logo tracking-wide text-white group-hover:text-cyan-50 transition-colors">{p.name}</h3>
                                        <p className="text-slate-400 text-base leading-relaxed mb-10 font-light">{p.desc}</p>
                                        <div className="flex justify-between items-center pt-6 border-t border-white/5 group-hover:border-white/10 transition-colors">
                                            <div className="flex -space-x-3">
                                                <div className="w-10 h-10 rounded-full bg-slate-900 border-2 border-black flex items-center justify-center text-xs font-bold text-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.2)]">TS</div>
                                                <div className="w-10 h-10 rounded-full bg-slate-900 border-2 border-black flex items-center justify-center text-xs font-bold text-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.2)]">BB</div>
                                            </div>
                                            <span className="text-[10px] uppercase tracking-widest font-bold text-slate-500 group-hover:text-cyan-500/70 transition-colors">SYNC: 0.04ms</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col h-screen overflow-hidden animate-[fadeIn_0.5s_ease-out]">
                    <header className="glass h-24 flex items-center justify-between px-12 shrink-0 z-50 border-b border-white/5 rounded-none">
                        <div className="flex items-center gap-8">
                            <button onClick={() => setView('dashboard')} className="glass p-3 rounded-full hover:bg-cyan-500/10 hover:border-cyan-500/50 transition-colors group">
                                <svg className="w-6 h-6 text-slate-400 group-hover:text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>
                            </button>
                            <div>
                                <h2 className="text-2xl font-logo tracking-widest text-white text-glow">STARK GLOBAL NET</h2>
                                <p className="text-[10px] text-cyan-400/80 uppercase tracking-[0.3em] font-bold mt-2">Access Level: Omega // Deep Space Relay</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-8">
                            <div className="flex items-center gap-4 glass px-5 py-2.5 rounded-full border-emerald-500/30">
                                <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,1)]"></div>
                                <span className="text-[10px] font-bold uppercase tracking-[0.2em] text-emerald-400">Systems Nominal</span>
                            </div>
                            <button className="bg-cyan-500 text-black px-8 py-3.5 rounded-full font-black text-xs uppercase tracking-widest accent-glow hover:bg-cyan-400 transition-all transform active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.5)]">
                                Append Directive +
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-x-auto p-12 flex gap-10">
                        {COLUMNS.map(col => (
                            <div key={col.id} className="min-w-[400px] w-[400px] flex flex-col shrink-0">
                                <div className="flex items-center justify-between mb-8 px-2">
                                    <div className="flex items-center gap-4">
                                        <div className="w-2.5 h-2.5 rounded-sm" style={{ background: col.color, boxShadow: `0 0 15px ${col.color}` }}></div>
                                        <span className="font-logo font-bold text-white tracking-[0.15em] text-sm">{col.label}</span>
                                    </div>
                                    <span className="text-[11px] bg-slate-900/80 border border-slate-700/50 px-3.5 py-1.5 rounded-lg text-cyan-400 font-black tracking-wider shadow-inner">{tasks.filter(t => t.status === col.id).length}</span>
                                </div>
                                <div className="flex-1 space-y-5 overflow-y-auto pb-10 pr-4">
                                    {tasks.filter(t => t.status === col.id).map(task => (
                                        <div key={task.id} className="glass p-8 rounded-[24px] border border-white/5 cursor-pointer card-hover group relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-cyan-500/50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                            <div className="flex justify-between items-center mb-6">
                                                <span className={`text-[9px] font-black uppercase tracking-[0.2em] px-3 py-1.5 rounded-md ${
                                                    task.priority === 'Critical' ? 'bg-red-500/10 text-red-400 border border-red-500/20 shadow-[0_0_10px_rgba(239,68,68,0.2)]' : 
                                                    task.priority === 'High' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20 shadow-[0_0_10px_rgba(245,158,11,0.2)]' : 
                                                    'bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 shadow-[0_0_10px_rgba(6,182,212,0.2)]'
                                                }`}>
                                                    {task.priority} ALERT
                                                </span>
                                                <span className="text-slate-600 text-[10px] font-logo tracking-widest">ID:{task.id}</span>
                                            </div>
                                            <h4 className="font-bold text-xl mb-4 leading-snug tracking-wide text-gray-100 group-hover:text-cyan-50 transition-colors">{task.title}</h4>
                                            <p className="text-slate-400 text-sm leading-relaxed mb-8 font-light">{task.desc}</p>
                                            <div className="flex justify-between items-center pt-5 border-t border-white/5 opacity-80 group-hover:opacity-100 transition-opacity">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-9 h-9 rounded-full bg-slate-900 flex items-center justify-center text-[10px] font-black text-white border border-slate-700 shadow-[0_0_10px_rgba(255,255,255,0.05)]">
                                                        {task.user}
                                                    </div>
                                                </div>
                                                <div className="flex gap-4 text-slate-500">
                                                    <svg className="w-5 h-5 hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <button className="w-full py-6 rounded-[24px] border border-dashed border-white/10 text-slate-500 font-bold text-[10px] tracking-[0.2em] hover:border-cyan-500/40 hover:text-cyan-400 hover:bg-cyan-500/5 transition-all uppercase mt-4">
                                        [ INJECT DIRECTIVE ]
                                    </button>
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
